name: codex-crc
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - pyarrow         # parquet I/O for cell tables
  - pyyaml          # config loading
  - scipy
  - scikit-image
  - tifffile
  - matplotlib
  - seaborn
  - jupyter
  - pytest
  - pip:
      - deepcell    # Mesmer segmentation
      - cellpose    # comparison segmentation
      - squidpy     # spatial neighborhood analysis
      - scanpy      # single-cell analysis / clustering
      - anndata     # single-cell data structure
      - lifelines   # survival analysis (Stage 6)
      - -e .        # editable install of the codex_crc package
