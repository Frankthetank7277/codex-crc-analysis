# !!! TODO — PLACEHOLDER CHANNEL PANEL !!!
#
# The `channels:` list below is a 12-marker REPRESENTATIVE SUBSET of the
# Schurch 2020 CRC panel, which contains 56 markers in total. It is wired up
# this way only so the smoke-test notebook can run end-to-end before real data
# is downloaded. Any real analysis WILL produce wrong results until this list
# is replaced with the full 56-marker panel, in the exact channel order of the
# TMA TIFFs, cross-referenced against Schurch 2020 Supplementary Table S1.
#
# Action item: after the first real TMA spot lands in data/raw/, replace the
# `channels:` list with the full panel and remove this banner.
# =============================================================================

# Single source of truth for pipeline parameters.
# All scripts and notebooks should read values from here rather than hardcoding.

project:
  random_seed: 42

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  results_dir: results

# Channels: order MUST match the TIFF channel index for each spot.
# Placeholder subset — see banner at top of file.
channels:
  - DAPI
  - CD45
  - CD4
  - CD8
  - CD20
  - CD68
  - CD163
  - PanCK
  - Vimentin
  - Ki67
  - aSMA
  - CD31

segmentation:
  backend: mesmer            # one of: mesmer, watershed
  image_mpp: 0.377           # microns per pixel; verify per dataset (Akoya CODEX standard at 20x)
  nuclear_channel: DAPI
  membrane_channels:         # summed to form the membrane input for Mesmer
    - PanCK
    - CD45

phenotyping:
  arcsinh_cofactor: 5        # standard for CODEX intensity transform
  leiden_resolution: 1.0
  # TODO: cell-type marker thresholds must come from Schurch 2020 Supplementary Table S2.

neighborhood:
  radius_um: 50              # Schurch 2020 default for cellular neighborhood graph
  n_neighborhoods: 9         # target CN count to replicate Schurch 2020
